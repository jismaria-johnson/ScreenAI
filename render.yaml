services:
  - type: web
    name: screenai-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn screenai.wsgi:application"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_CONN_MAX_AGE
        value: "60"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: "True"
      - key: SUPABASE_STORAGE_ENABLED
        value: "True"
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: SUPABASE_S3_ENDPOINT_URL
        sync: false
      - key: SUPABASE_S3_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_S3_SECRET_ACCESS_KEY
        sync: false
      - key: SUPABASE_S3_REGION
        sync: false
      - key: SUPABASE_STORAGE_URL_EXPIRY_SECONDS
        value: "3600"
      - key: EVALUATION_ENABLED
        value: "False"
      - key: GEMINI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
